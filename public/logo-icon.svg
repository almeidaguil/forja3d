<svg viewBox="0 0 52 56" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forja3D logo icon">
  <defs>
    <!-- Glow background -->
    <radialGradient id="icon-bg-glow" cx="50%" cy="68%" r="52%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <!-- Top face: amber light to vivid orange -->
    <linearGradient id="icon-face-top" gradientUnits="userSpaceOnUse" x1="6" y1="8" x2="46" y2="28">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Left face: deep shadow -->
    <linearGradient id="icon-face-left" gradientUnits="userSpaceOnUse" x1="6" y1="18" x2="26" y2="48">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <!-- Right face: mid shadow -->
    <linearGradient id="icon-face-right" gradientUnits="userSpaceOnUse" x1="26" y1="18" x2="46" y2="48">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <!-- Subtle cube glow -->
    <filter id="icon-cube-glow" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient heat glow behind cube -->
  <ellipse cx="26" cy="36" rx="22" ry="15" fill="url(#icon-bg-glow)"/>

  <!-- Cube with glow filter -->
  <g filter="url(#icon-cube-glow)">
    <!-- Top face -->
    <polygon points="26,8 46,18 26,28 6,18" fill="url(#icon-face-top)"/>
    <!-- Left face -->
    <polygon points="6,18 26,28 26,48 6,38" fill="url(#icon-face-left)"/>
    <!-- Right face -->
    <polygon points="26,28 46,18 46,38 26,48" fill="url(#icon-face-right)"/>
  </g>

  <!-- Top-edge highlight (rim light) -->
  <polyline points="26,8 46,18 26,28 6,18 26,8" fill="none" stroke="#fef9c3" stroke-width="0.55" stroke-opacity="0.55"/>

  <!-- ── Sparks ── -->
  <!-- Large 4-pointed star, upper-right -->
  <path d="M46,4.5 L46.53,6.47 L48.5,7 L46.53,7.53 L46,9.5 L45.47,7.53 L43.5,7 L45.47,6.47 Z"
        fill="#fcd34d"/>
  <!-- Medium star, upper-center -->
  <path d="M37,1.2 L37.38,2.62 L38.8,3 L37.38,3.38 L37,4.8 L36.62,3.38 L35.2,3 L36.62,2.62 Z"
        fill="#fbbf24" opacity="0.9"/>
  <!-- Small star, upper-left -->
  <path d="M12,6.8 L12.25,7.75 L13.2,8 L12.25,8.25 L12,9.2 L11.75,8.25 L10.8,8 L11.75,7.75 Z"
        fill="#fb923c" opacity="0.85"/>

  <!-- Dot sparks -->
  <circle cx="26" cy="3"  r="0.9" fill="#fde68a" opacity="0.9"/>
  <circle cx="50" cy="20" r="1.0" fill="#fbbf24" opacity="0.78"/>
  <circle cx="51" cy="15" r="0.65" fill="#fcd34d" opacity="0.7"/>
  <circle cx="3"  cy="23" r="0.75" fill="#ea580c" opacity="0.6"/>

  <!-- Streak embers -->
  <line x1="44" y1="5.5" x2="41.5" y2="3.8" stroke="#fcd34d" stroke-width="0.75" stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="6"   x2="9"    y2="4.5" stroke="#fb923c" stroke-width="0.6"  stroke-linecap="round" opacity="0.6"/>
</svg>
