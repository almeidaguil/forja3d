name: Auto Release (develop → main)

on:
  # Triggered manually via workflow dispatch or when a specific tag is created
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to release (default: develop)'
        required: false
        default: 'develop'

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fetch branches
        run: |
          git fetch origin develop:develop
          git fetch origin main:main

      - name: Check if develop is ahead of main
        run: |
          BEHIND=$(git rev-list --count develop..main || echo 0)
          AHEAD=$(git rev-list --count main..develop || echo 0)
          echo "develop is $AHEAD commits ahead of main"
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits in develop. Skipping release."
            exit 0
          fi

      - name: Run tests locally
        run: |
          node --version
          npm install
          npm run lint
          npm run build

      - name: Create Pull Request (or get existing)
        id: create_pr
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base main --head develop --json number --jq ".[0].number" || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists"
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            # Create new PR
            gh pr create \
              --base main \
              --head develop \
              --title "chore(release): promote develop to main" \
              --body "**Automated Release PR**

Geometry improvements and fixes from develop branch.

**Verification:**
- ✅ npm run lint passed
- ✅ npm run build passed
- ✅ All tests passed

**Commits included:**
$(git log --oneline main..develop | sed 's/^/- /')" \
              --draft=false \
              --json number \
              --jq ".number"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR (with default strategy)
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pr_number }} \
            --merge \
            --delete-branch \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check merge status
        run: |
          echo "Release workflow completed. Check GitHub for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
